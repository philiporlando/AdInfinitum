name: uv lock check
permissions:
  contents: read
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
jobs:
  lock-check:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/astral-sh/uv:python3.13-bookworm-slim
    steps:
      - uses: actions/checkout@v4
      - name: Check lock file is up to date
        run: uv lock --check
